<div class="panel panel-default">
    <div class="panel-heading">
        <h4 class="panel-title">Contacts</h4>
        <a href="#" class="btn btn-primary btn-xs">New Contact</a>
    </div>
    <div class="panel-body">
        <div class="row" *ngFor="let contact of contacts">
            <div class="col-md-2">
                <img alt="{{ contact.name }}" src="{{ contact.imageUrl }}" class="img-responsive img-circle">
            </div>
            <div class="col-md-10">
                <h5><a href="#">{{ contact.name }}</a></h5>
            </div>
        </div>
    </div>
</div>
